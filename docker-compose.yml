

services:

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: socialmedia
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "3360:3360"
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: socialmedia
      CLIENT_URL: http://localhost:3000
    depends_on:
      - db

  client:
    build: 
      context: ./client
      args:
       VITE_API_URL: http://localhost:3360/api
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
